name: Update SuperLiga Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Matches Fetcher (RapidAPI)
        run: node .github/scripts/fetch_matches.mjs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Run Standings Calculator (Internal Logic)
        run: node .github/scripts/fetch_standings.mjs

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/superliga.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update matches and recalculate standings [skip ci]" && git push)
