name: Update SuperLiga Scores
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Data
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node .github/scripts/fetch_scores.mjs

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Creăm fișierul dacă scriptul a eșuat, ca să nu dea eroare git add
          mkdir -p data
          touch data/superliga.json
          
          git add data/superliga.json
          if git diff --cached --quiet; then
            echo "Nicio schimbare."
          else
            git commit -m "Update scores [skip ci]"
            git push origin main
          fi
