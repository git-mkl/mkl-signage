name: SuperLiga Data Sync

on:
  schedule:
    - cron: '*/15 * * * *' # Rulează la fiecare 15 minute
  workflow_dispatch: # Permite rularea manuală pentru teste

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch Football Data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node .github/scripts/fetch_scores.mjs

      - name: Check if data was generated
        run: |
          if [ -f data/superliga.json ]; then
            echo "File exists, size: $(stat -c%s data/superliga.json) bytes"
            cat data/superliga.json
          else
            echo "Error: data/superliga.json was not created!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/superliga.json
          git commit -m "Update SuperLiga scores [skip ci]" || echo "No changes to commit"
          git push
