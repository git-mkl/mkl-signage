name: Update SuperLiga Scores

on:
  schedule:
    # Rulează la fiecare 30 de minute
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite rularea manuală din interfața GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        # Aceasta este singura dependință necesară pentru scraping
        run: npm install cheerio 

      - name: Fetch Football Data
        run: node .github/scripts/fetch_scores.mjs
        env:
          # Asigură-te că ai acest secret salvat în GitHub Settings > Secrets
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/superliga.json
          git commit -m "Update SuperLiga scores [skip ci]" || exit 0
          git push
