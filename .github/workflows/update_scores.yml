name: Update SuperLiga Data

on:
  schedule:
    # Rulează la fiecare 30 de minute
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite declanșarea manuală pentru teste

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # Elimină warning-ul de deprecation pentru Node
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        # Instalăm cheerio pentru scriptul de standings
        run: npm install cheerio

      - name: Run Standings Scraper (FotMob)
        # Acesta actualizează partea de clasament în superliga.json
        run: node .github/scripts/fetch_standings.mjs

      - name: Run Matches Fetcher (RapidAPI - jQuery Logic)
        # Acesta adaugă meciurile în același fișier superliga.json
        run: node .github/scripts/fetch_matches.mjs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit and Push changes
        # Salvăm rezultatul final (care conține și clasamentul și meciurile)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/superliga.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scores and standings [skip ci]" && git push)
