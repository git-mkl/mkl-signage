steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Update Standings (Gratuit)
        run: node .github/scripts/fetch_standings.mjs
        
      - name: Update Matches (RapidAPI)
        run: node .github/scripts/fetch_matches.mjs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
