name: Update SuperLiga Data

on:
  schedule:
    # Rulează la fiecare 60 de minute (economisește cota API, dar ține datele proaspete)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite declanșarea manuală din tab-ul Actions

jobs:
  update:
    runs-on: ubuntu-latest
    
    # Permisiuni necesare pentru ca GitHub Actions să poată face commit în repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Avem nevoie de cheerio doar pentru scriptul de standings
        run: npm install cheerio

      - name: Run Standings Scraper (Zero Quota)
        # Rulează primul pentru a genera baza JSON sau a actualiza clasamentul
        run: node .github/scripts/fetch_standings.mjs

      - name: Run Matches Fetcher (RapidAPI Quota)
        # Rulează al doilea pentru a adăuga meciurile peste clasament
        run: node .github/scripts/fetch_matches.mjs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/superliga.json
          # Verificăm dacă există modificări înainte de commit pentru a evita erorile
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scores and standings [skip ci]" && git push)
