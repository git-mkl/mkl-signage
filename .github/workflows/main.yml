steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install cheerio # SINGURA DEPENDENȚĂ EXTERNĂ
      - name: Fetch Data
        run: node .github/scripts/fetch_scores.mjs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
