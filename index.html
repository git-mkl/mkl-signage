<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Tizen TV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <h2>Meciuri • SuperLiga</h2>
            <div id="matches-grid">
                <p style="color:#9aa0a6">Incarcare...</p>
            </div>
        </div>
        <div class="sidebar">
            <h2>Clasament</h2>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th><th>Echipa</th><th class="col-num">MJ</th><th style="text-align:right">Pct</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            // Adaugam timestamp pentru a evita cache-ul agresiv al televizoarelor
            xhr.open('GET', 'data/superliga.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    renderMatches(data.matches);
                    renderStandings(data.standings);
                }
            };
            xhr.send();
        }

        function renderMatches(matches) {
            var html = '';
            if (!matches || matches.length === 0) {
                html = '<p>Nu sunt meciuri disponibile.</p>';
            } else {
                for (var i = 0; i < matches.length; i++) {
                    var m = matches[i];
                    html += '<div class="match-card">' +
                                '<div class="m-status">' + (m.status === 'Finalizat' ? 'FT' : m.date + ' ' + m.time) + '</div>' +
                                '<div class="team-row"><span class="team-name">' + m.home.name + '</span><span class="score">' + (m.home.score !== null ? m.home.score : '-') + '</span></div>' +
                                '<div class="team-row"><span class="team-name">' + m.away.name + '</span><span class="score">' + (m.away.score !== null ? m.away.score : '-') + '</span></div>' +
                            '</div>';
                }
            }
            document.getElementById('matches-grid').innerHTML = html;
        }

        function renderStandings(standings) {
            var html = '';
            if (standings && standings.length > 0) {
                for (var j = 0; j < standings.length; j++) {
                    var s = standings[j];
                    html += '<tr>' +
                                '<td class="col-num">' + (s.rank || s.pos) + '</td>' +
                                '<td><strong>' + s.name + '</strong></td>' +
                                '<td class="col-num">' + (s.pj || 0) + '</td>' +
                                '<td class="col-pct">' + (s.pts || 0) + '</td>' +
                            '</tr>';
                }
            }
            document.getElementById('standings-body').innerHTML = html;
        }

        // Pornire si refresh la 5 minute (mai rar pentru TV ca sa nu consume resurse)
        updateUI();
        setInterval(updateUI, 300000);
    </script>
</body>
</html>
