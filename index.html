<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga România LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 40px;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
            color: #ffffff; font-family: 'Inter', Arial, sans-serif;
            width: 1920px; height: 1080px; overflow: hidden;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #c5a059; padding-bottom: 15px; margin-bottom: 40px;
        }
        .brand { font-size: 48px; font-weight: 900; color: #c5a059; text-transform: uppercase; }
        .clock { font-size: 38px; font-weight: 300; color: #94a3b8; }

        .container { width: 100%; text-align: center; }

        .card {
            display: inline-block; width: 900px; height: 500px;
            background: #141c2f; border-radius: 40px; padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border-top: 12px solid #ff2a4d; vertical-align: middle;
        }

        .meta { display: flex; justify-content: space-between; font-size: 22px; font-weight: 700; color: #c5a059; margin-bottom: 40px; }
        .status { color: #ff2a4d; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .live-pulse { animation: blink 1.2s infinite; }

        .content { display: flex; align-items: center; justify-content: space-between; height: 250px; }
        .team { width: 35%; text-align: center; }
        .team img { width: 180px; height: 180px; object-fit: contain; margin-bottom: 20px; }
        .team-name { font-size: 36px; font-weight: 800; color: #fff; line-height: 1.1; }

        .score-pill { 
            background: #000; width: 240px; height: 140px; border-radius: 30px; 
            display: flex; align-items: center; justify-content: center; 
            border: 2px solid rgba(197, 160, 89, 0.5); 
        }
        .score-val { font-size: 100px; font-weight: 900; flex: 1; text-align: center; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .empty { font-size: 32px; margin-top: 200px; opacity: 0.6; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <div class="brand">SuperLiga <span>România</span></div>
        <div id="clock" class="clock">00:00:00</div>
    </header>

    <div id="display" class="container">
        <div class="empty">Se scanează SuperLiga... <br> Pregătim meciul FC Botoșani vs FCSB</div>
    </div>

    <script>
        function updateClock() {
            var now = new Date();
            var h = ("0" + now.getHours()).slice(-2);
            var m = ("0" + now.getMinutes()).slice(-2);
            var s = ("0" + now.getSeconds()).slice(-2);
            document.getElementById('clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000); updateClock();

        function loadData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/.netlify/functions/get-romania?t=" + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    render(JSON.parse(xhr.responseText));
                }
            };
            xhr.send();
        }

        function render(events) {
            var board = document.getElementById('display');
            if (!events || events.length === 0) {
                board.innerHTML = '<div class="empty">Niciun meci LIVE momentan.<br><small>Reveniți la 20:30 pentru Botoșani vs FCSB</small></div>';
                return;
            }

            var html = "";
            for (var i = 0; i < events.length; i++) {
                var e = events[i];
                // 'inprogress' is the type for live games in SportAPI
                var isLive = (e.status && e.status.type === "inprogress");
                var statusText = e.status ? e.status.description : "NS";
                
                // Score mapping from your JSON
                var hS = (e.homeScore && e.homeScore.display !== undefined) ? e.homeScore.display : "0";
                var aS = (e.awayScore && e.awayScore.display !== undefined) ? e.awayScore.display : "0";

                // High-res logo format
                var hLogo = "https://api.sofascore.app/api/v1/team/" + e.homeTeam.id + "/image";
                var aLogo = "https://api.sofascore.app/api/v1/team/" + e.awayTeam.id + "/image";

                html += '<div class="card">' +
                    '<div class="meta"><div>' + e.tournament.name + '</div><div class="status ' + (isLive ? 'live-pulse' : '') + '">' + statusText + '</div></div>' +
                    '<div class="content">' +
                        '<div class="team"><img src="' + hLogo + '"><div class="team-name">' + e.homeTeam.name + '</div></div>' +
                        '<div class="score-pill"><div class="score-val">' + hS + '</div><div style="opacity:0.2;font-size:40px">-</div><div class="score-val">' + aS + '</div></div>' +
                        '<div class="team"><img src="' + aLogo + '"><div class="team-name">' + e.awayTeam.name + '</div></div>' +
                    '</div></div>';
            }
            board.innerHTML = html;
        }

        loadData();
        setInterval(loadData, 120000); 
    </script>
</body>
</html>
