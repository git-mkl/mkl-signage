<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #020617; color: #ffffff; font-family: 'Inter', sans-serif; width: 1920px; height: 1080px; display: flex; overflow: hidden; }
        
        .sidebar { width: 22%; height: 100%; background: #0f172a; border-left: 2px solid #c5a059; padding: 25px; }
        .sidebar h2 { color: #c5a059; font-size: 24px; text-transform: uppercase; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 15px; margin-top: 0; }
        .rank-table { width: 100%; border-collapse: collapse; }
        .rank-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 19px; }
        .pos-col { color: #c5a059; font-weight: 900; width: 40px; }
        .pts-col { font-weight: 900; text-align: right; color: #fff; }

        .main { width: 78%; height: 100%; padding: 40px; display: flex; flex-direction: column; }
        
        .top-row { display: flex; gap: 30px; height: 160px; margin-bottom: 30px; }
        .last-card { flex: 1; background: #1e293b; border-radius: 25px; padding: 20px; border-top: 6px solid #3b82f6; }
        .last-card h4 { margin: 0; font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        .last-res-content { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; font-size: 24px; font-weight: 800; }
        .highlight-team { color: #3b82f6; }

        .hero { flex: 1; background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%); border-radius: 40px; border: 1px solid rgba(197, 160, 89, 0.4); padding: 50px; position: relative; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .status-badge { position: absolute; top: 40px; left: 50px; background: #334155; padding: 8px 20px; border-radius: 50px; font-weight: 900; font-size: 18px; }
        .live-pulse { background: #ff2a4d !important; animation: pulse 1.5s infinite; }
        
        .hero-main { display: flex; align-items: center; justify-content: space-between; }
        .hero-team { width: 33%; text-align: center; }
        .hero-team img { width: 180px; height: 180px; object-fit: contain; margin-bottom: 20px; }
        .hero-team h1 { font-size: 48px; margin: 0; font-weight: 900; }
        .score-box { font-size: 100px; font-weight: 900; background: #000; padding: 15px 50px; border-radius: 30px; border: 3px solid #c5a059; }

        .bottom-row { display: flex; gap: 25px; height: 160px; margin-top: 40px; }
        .up-card { flex: 1; background: rgba(30, 41, 59, 0.6); border-radius: 20px; padding: 20px; text-align: center; border-bottom: 5px solid #c5a059; }
        .up-card .time { font-size: 14px; color: #c5a059; font-weight: 900; }
        .up-card .teams { font-size: 20px; font-weight: 800; margin-top: 15px; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="main">
        <div class="top-row">
            <div class="last-card"><h4>Etapa Trecută: <span id="h-name-short">Gazde</span></h4><div class="last-res-content" id="h-last-box">--</div></div>
            <div class="last-card"><h4>Etapa Trecută: <span id="a-name-short">Oaspeți</span></h4><div class="last-res-content" id="a-last-box">--</div></div>
        </div>
        
        <div class="hero">
            <div id="status" class="status-badge">STANDBY</div>
            <div class="hero-main">
                <div class="hero-team">
                    <img id="h-logo" src="">
                    <h1 id="h-name-hero">--</h1>
                    <div id="h-rank" style="color:#c5a059; font-weight:700; font-size:20px; margin-top:10px;"></div>
                </div>
                <div class="hero-score"><div class="score-box" id="score">--:--</div></div>
                <div class="hero-team">
                    <img id="a-logo" src="">
                    <h1 id="a-name-hero">--</h1>
                    <div id="a-rank" style="color:#c5a059; font-weight:700; font-size:20px; margin-top:10px;"></div>
                </div>
            </div>
            <div id="match-info" style="text-align:center; margin-top:40px; color:#94a3b8; font-size:24px;">Se preiau datele din SuperLiga...</div>
        </div>

        <div class="bottom-row" id="upcoming-list"></div>
    </div>

    <div class="sidebar">
        <h2>Clasament Live</h2>
        <table class="rank-table"><tbody id="st-body"></tbody></table>
    </div>

    <script>
        function load() {
            fetch("data/superliga.json?t=" + Date.now())
                .then(r => r.json())
                .then(data => render(data))
                .catch(e => console.error("Eroare la citire JSON:", e));
        }

        function render(data) {
            if (data.error || !data.main) return;
            const m = data.main;

            // 1. Sidebar & Hero Ranks
            let sHtml = "";
            data.standings.forEach(s => {
                sHtml += `<tr><td class="pos-col">${s.position}</td><td>${s.team.shortName}</td><td class="pts-col">${s.points}</td></tr>`;
                if(s.team.id === m.homeTeam.id) document.getElementById('h-rank').innerText = "Locul " + s.position;
                if(s.team.id === m.awayTeam.id) document.getElementById('a-rank').innerText = "Locul " + s.position;
            });
            document.getElementById('st-body').innerHTML = sHtml;

            // 2. Hero Card
            document.getElementById('h-name-hero').innerText = m.homeTeam.shortName;
            document.getElementById('a-name-hero').innerText = m.awayTeam.shortName;
            document.getElementById('h-logo').src = `https://api.sofascore.app/api/v1/team/${m.homeTeam.id}/image`;
            document.getElementById('a-logo').src = `https://api.sofascore.app/api/v1/team/${m.awayTeam.id}/image`;
            
            const st = document.getElementById('status');
            if(m.status.type === "inprogress") {
                document.getElementById('score').innerText = `${m.homeScore.display}-${m.awayScore.display}`;
                st.innerText = "LIVE"; st.className = "status-badge live-pulse";
            } else {
                const date = new Date(m.startTimestamp * 1000);
                document.getElementById('score').innerText = date.toLocaleTimeString('ro-RO', {hour:'2-digit', minute:'2-digit'});
                st.innerText = m.status.description; st.className = "status-badge";
            }
            document.getElementById('match-info').innerText = new Date(m.startTimestamp*1000).toLocaleDateString('ro-RO', {day:'2-digit', month:'long'}) + " | SuperLiga România";

            // 3. Last Results (Top Cards)
            const fmt = (match, tId) => {
                if(!match) return "Fără date";
                const hN = match.homeTeam.id === tId ? `<span class="highlight-team">${match.homeTeam.shortName}</span>` : match.homeTeam.shortName;
                const aN = match.awayTeam.id === tId ? `<span class="highlight-team">${match.awayTeam.shortName}</span>` : match.awayTeam.shortName;
                return `<span>${hN}</span> <span>${match.homeScore.display}-${match.awayScore.display}</span> <span>${aN}</span>`;
            };
            document.getElementById('h-last-box').innerHTML = fmt(data.hLast, m.homeTeam.id);
            document.getElementById('a-last-box').innerHTML = fmt(data.aLast, m.awayTeam.id);

            // 4. Upcoming (Bottom)
            let uHtml = "";
            data.upcoming.forEach(u => {
                const ud = new Date(u.startTimestamp * 1000);
                uHtml += `<div class="up-card"><div class="time">${ud.toLocaleTimeString('ro-RO',{hour:'2-digit', minute:'2-digit'})}</div><div class="teams">${u.homeTeam.shortName} - ${u.awayTeam.shortName}</div></div>`;
            });
            document.getElementById('upcoming-list').innerHTML = uHtml || '<div class="up-card">Final de etapă</div>';
        }

        load(); setInterval(load, 60000);
    </script>
</body>
</html>
