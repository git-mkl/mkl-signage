<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Football Signage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- CORE STABILITY & THEME --- */
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 40px 60px;
            background: radial-gradient(circle at 50% 0%, #1c2841 0%, #07090f 100%);
            color: #ffffff;
            font-family: 'Inter', Arial, sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 40px;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-text {
            font-size: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .brand-text span { 
            color: #ff2a4d; 
            text-shadow: 0 0 15px rgba(255, 42, 77, 0.5);
        }

        .clock-text {
            font-size: 40px;
            font-weight: 300;
            color: #cbd5e1;
        }

        /* --- SCOREBOARD GRID --- */
        #scoreboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            align-content: flex-start;
            flex-grow: 1;
        }

        .match-card {
            width: 31%; 
            margin-right: 2.3%;
            height: 380px;
            margin-bottom: 35px;
            background: linear-gradient(145deg, #141c2f 0%, #0d1323 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 6px solid #3b82f6; 
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Remove margin from every 3rd card */
        .match-card:nth-child(3n) { margin-right: 0; }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .live-badge {
            background: rgba(255, 42, 77, 0.15);
            border: 1px solid rgba(255, 42, 77, 0.4);
            color: #ff2a4d;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 900;
        }

        .match-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }

        .team-box {
            width: 35%;
            text-align: center;
        }

        .team-box img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
        }

        .team-name {
            font-size: 22px;
            font-weight: 700;
            color: #f8fafc;
        }

        /* --- BULLETPROOF SCORE PILL --- */
        .score-pill {
            width: 160px;
            height: 90px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .score-digit {
            flex: 1;
            text-align: center;
            font-size: 55px;
            font-weight: 900;
        }

        .score-dash {
            font-size: 25px;
            opacity: 0.4;
        }

        /* --- STANDBY / ERROR STATE --- */
        .standby-container {
            width: 100%;
            text-align: center;
            padding-top: 150px;
            opacity: 0.7;
        }

        .standby-icon { font-size: 100px; margin-bottom: 30px; }
        .standby-title { font-size: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; color: #3b82f6; }
        .standby-subtitle { font-size: 22px; color: #94a3b8; margin-top: 15px; }

        .error-text { color: #ff2a4d; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="brand-text">LIVE<span>SCORES</span></div>
        <div class="clock-text" id="clock">00:00:00</div>
    </header>

    <div id="scoreboard"></div>

    <script>
        // 1. CLOCK (Manual String Builder for Tizen Stability)
        function updateClock() {
            var now = new Date();
            var h = ("0" + now.getHours()).slice(-2);
            var m = ("0" + now.getMinutes()).slice(-2);
            var s = ("0" + now.getSeconds()).slice(-2);
            document.getElementById('clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. FETCH FROM NETLIFY PROXY
        function fetchMatches() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/.netlify/functions/get-scores", true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var json = JSON.parse(xhr.responseText);
                            if (!json.data || json.data.length === 0) {
                                showStandby();
                            } else {
                                renderMatches(parseData(json.data));
                            }
                        } catch (e) {
                            showError("Data Parsing Error");
                        }
                    } else {
                        showError("Connection Error (HTTP " + xhr.status + ")");
                    }
                }
            };
            xhr.send();
        }

        // 3. PARSE SPORTMONKS DATA
        function parseData(matchesArray) {
            var parsed = [];
            var limit = Math.min(matchesArray.length, 6);

            for (var i = 0; i < limit; i++) {
                var m = matchesArray[i];
                var home = { name: "Home", logo: "" }, away = { name: "Away", logo: "" };
                
                if (m.participants) {
                    for (var j = 0; j < m.participants.length; j++) {
                        var p = m.participants[j];
                        if (p.meta && p.meta.location === 'home') home = { name: p.name, logo: p.image_path };
                        if (p.meta && p.meta.location === 'away') away = { name: p.name, logo: p.image_path };
                    }
                }

                var hS = 0, aS = 0;
                if (m.scores && m.scores.length >= 2) {
                    hS = m.scores[0].score.goals || 0;
                    aS = m.scores[1].score.goals || 0;
                }

                parsed.push({
                    league: (m.league && m.league.name) ? m.league.name : "Live Match",
                    minute: (m.state && m.state.name) ? m.state.name : "LIVE",
                    home: home,
                    away: away,
                    score: hS + " - " + aS
                });
            }
            return parsed;
        }

        // 4. RENDER MATCH CARDS
        function renderMatches(matches) {
            var board = document.getElementById('scoreboard');
            var html = "";
            var placeholder = "https://cdn.sportmonks.com/images/soccer/placeholder.png";

            for (var i = 0; i < matches.length; i++) {
                var m = matches[i];
                var scoreParts = m.score.split(' - ');

                html += '<div class="match-card">';
                html += '  <div class="match-header"><div>' + m.league + '</div><div class="live-badge">' + m.minute + '\'</div></div>';
                html += '  <div class="match-content">';
                html += '    <div class="team-box"><img src="' + m.home.logo + '" onerror="this.src=\''+placeholder+'\'"><span class="team-name">' + m.home.name + '</span></div>';
                html += '    <div class="score-pill"><div class="score-digit">' + scoreParts[0] + '</div><div class="score-dash">-</div><div class="score-digit">' + scoreParts[1] + '</div></div>';
                html += '    <div class="team-box"><img src="' + m.away.logo + '" onerror="this.src=\''+placeholder+'\'"><span class="team-name">' + m.away.name + '</span></div>';
                html += '  </div>';
                html += '</div>';
            }
            board.innerHTML = html;
        }

        // 5. STANDBY & ERROR DISPLAYS
        function showStandby() {
            document.getElementById('scoreboard').innerHTML = 
                '<div class="standby-container">' +
                '  <div class="standby-icon">📡</div>' +
                '  <div class="standby-title">Live Feed Active</div>' +
                '  <div class="standby-subtitle">Awaiting kickoff for Scottish & Danish Leagues</div>' +
                '</div>';
        }

        function showError(msg) {
            document.getElementById('scoreboard').innerHTML = 
                '<div class="standby-container">' +
                '  <div class="standby-icon">⚠️</div>' +
                '  <div class="standby-title error-text">System Alert</div>' +
                '  <div class="standby-subtitle">' + msg + '</div>' +
                '</div>';
        }

        // START
        fetchMatches();
        setInterval(fetchMatches, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
