<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga 2026 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <h2 class="section-title">Meciuri • SuperLiga</h2>
            <div id="matches-grid" class="matches-grid"></div>
        </main>
        <aside>
            <h2 class="section-title">Clasament</h2>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th><th>Echipă</th><th class="col-num">MJ</th><th class="col-num">GD</th><th style="text-align:right">Pct</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </aside>
    </div>

    <script>
        async function updateUI() {
            try {
                const res = await fetch('data/superliga.json?t=' + Date.now());
                const data = await res.json();

                document.getElementById('matches-grid').innerHTML = data.matches.map(m => `
                    <div class="match-card">
                        <div class="status">${m.status === 'FT' ? 'Finalizat' : 'Azi ' + m.timeStr}</div>
                        <div class="team-row"><span>${m.home.name}</span><span class="score">${m.home.score ?? 0}</span></div>
                        <div class="team-row"><span>${m.away.name}</span><span class="score">${m.away.score ?? 0}</span></div>
                    </div>
                `).join('');

                document.getElementById('standings-body').innerHTML = data.standings.map(s => `
                    <tr>
                        <td style="color:#9aa0a6">${s.rank}</td>
                        <td style="font-weight:500">${s.team}</td>
                        <td class="col-num">${s.pj}</td>
                        <td class="col-num">${s.gd}</td>
                        <td class="col-pts">${s.pts}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Eroare UI:", e); }
        }
        updateUI();
        setInterval(updateUI, 60000);
    </script>
</body>
</html>
