<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>SuperLiga TV</title>
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="column col-left">
            <div class="group-title">Meciuri Azi</div>
            <div id="today-area"></div>

            <div class="bottom-widget">
                <div class="group-title">Ultimele Rezultate</div>
                <div class="compact-matches-card" id="past-area"></div>
            </div>
        </div>

        <div class="column col-central">
            <div class="group-title">Program</div>
            <div id="future-area"></div>
        </div>

        <div class="column col-table">
            <div class="table-card">
                
                <div class="table-header-tag badge-po">PLAY-OFF</div>
                <table>
                    <thead>
                        <tr><th width="40">#</th><th align="left">Echipă</th><th width="50">MJ</th><th width="50">GD</th><th width="70">Pts</th></tr>
                    </thead>
                    <tbody id="po-table"></tbody>
                </table>

                <div class="table-header-tag badge-pout">PLAY-OUT</div>
                <table>
                    <thead>
                        <tr><th width="40">#</th><th align="left">Echipă</th><th width="50">MJ</th><th width="50">GD</th><th width="70">Pts</th></tr>
                    </thead>
                    <tbody id="pout-table"></tbody>
                </table>

            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data/superliga.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var d = JSON.parse(xhr.responseText);
                    
                    renderCompactPastMatches('past-area', d.past);
                    renderMatches('today-area', d.today);
                    // Afișăm MAXIM 6 meciuri viitoare pentru a nu depăși ecranul
                    renderMatches('future-area', d.future.slice(0, 6));

                    renderTable('po-table', d.standingsPlayoff);
                    renderTable('pout-table', d.standingsPlayout);
                }
            };
            xhr.send();
        }

        function renderCompactPastMatches(id, list) {
            var el = document.getElementById(id);
            if (!list || list.length === 0) {
                el.innerHTML = '<div style="color:#777; text-align:center; padding: 10px;">Fără rezultate recente</div>';
                return;
            }
            var html = '';
            var maxItems = Math.min(list.length, 4);
            
            for (var i = 0; i < maxItems; i++) {
                var m = list[i];
                var hLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/'+m.home.id+'.png';
                var aLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/'+m.away.id+'.png';
                
                var phaseClass = m.phase === "Play-off" ? 'cp-po' : 'cp-pout';
                var phaseText = m.phase === "Play-off" ? 'PLAY-OFF' : 'PLAY-OUT';

                html += '<div class="c-row">' +
                    '<div class="c-team-home">' + m.home.name + '</div>' +
                    '<img src="' + hLogo + '" class="c-logo">' +
                    '<div class="c-score">' + m.home.score + '-' + m.away.score + '</div>' +
                    '<img src="' + aLogo + '" class="c-logo">' +
                    '<div class="c-team-away">' + m.away.name + '</div>' +
                    '<div class="c-phase ' + phaseClass + '">' + phaseText + '</div>' +
                '</div>';
            }
            el.innerHTML = html;
        }

        function renderMatches(id, list) {
            var el = document.getElementById(id);
            if (!list || list.length === 0) {
                el.innerHTML = '<div style="color:#777;font-size:20px;padding:20px;text-align:center;">Niciun meci</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var m = list[i];
                var hLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/'+m.home.id+'.png';
                var aLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/'+m.away.id+'.png';
                
                // Tag complet PLAY-OFF / PLAY-OUT
                var phaseBadge = m.phase === "Play-off" ? '<span style="color:#4da3ff; font-size:14px; margin-left:10px;">[PLAY-OFF]</span>' : '<span style="color:#ffcc00; font-size:14px; margin-left:10px;">[PLAY-OUT]</span>';

                if (m.status === 'LIVE') {
                    html += '<div class="live-tracker-card">' +
                        '<div class="live-header"><span class="live-minute">● '+m.time+'</span><span class="status-right" style="color:#888;">LIVE '+phaseBadge+'</span></div>' +
                        '<div style="clear:both"></div>' +
                        '<div class="team-row"><img src="'+hLogo+'" class="small-logo"><span class="team-name" style="width:250px;">'+m.home.name+'</span><span class="score">'+m.home.score+'</span></div>' +
                        '<div class="team-row" style="margin-bottom:8px;"><img src="'+aLogo+'" class="small-logo"><span class="team-name" style="width:250px;">'+m.away.name+'</span><span class="score">'+m.away.score+'</span></div>' +
                        '<div class="live-pitch">MECI ÎN DESFĂȘURARE</div>' +
                    '</div>';
                } else {
                    var st = m.status === 'FT' ? 'FINAL' : m.time;
                    html += '<div class="match-card">' +
                        '<div class="m-status"><span class="status-left">'+st+phaseBadge+'</span><span class="status-right">'+m.date+'</span></div>' +
                        '<div style="clear:both"></div>' +
                        '<div class="team-row"><img src="'+hLogo+'" class="small-logo"><span class="team-name">'+m.home.name+'</span><span class="score">'+(m.home.score !== "-" ? m.home.score : "")+'</span></div>' +
                        '<div class="team-row"><img src="'+aLogo+'" class="small-logo"><span class="team-name">'+m.away.name+'</span><span class="score">'+(m.away.score !== "-" ? m.away.score : "")+'</span></div>' +
                    '</div>';
                }
            }
            el.innerHTML = html;
        }

        function renderTable(id, list) {
            var html = '';
            for (var i = 0; i < (list || []).length; i++) {
                var s = list[i];
                html += '<tr>' +
                    '<td>'+s.rank+'</td>' +
                    '<td class="t-name-cell"><img src="https://images.fotmob.com/image_resources/logo/teamlogo/'+s.id+'.png" class="small-logo">'+s.name+'</td>' +
                    '<td>'+s.pj+'</td>' +
                    '<td>'+(s.gd > 0 ? '+' + s.gd : s.gd)+'</td>' +
                    '<td class="pts-bold">'+s.pts+'</td>' +
                '</tr>';
            }
            document.getElementById(id).innerHTML = html;
        }

        updateUI(); 
        setInterval(updateUI, 15000); 
    </script>
</body>
</html>
