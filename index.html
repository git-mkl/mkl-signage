<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Dashboard - Test Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <div id="hero-grid" class="hero-grid"></div>
            <div id="upcoming-row" class="upcoming-row"></div>
        </main>
        <aside class="sidebar">
            <h2 style="margin:0 0 20px 0; font-size:1rem; color:#8b949e">CLASAMENT (MOD TEST 2024)</h2>
            <div id="standings-list"></div>
        </aside>
    </div>

    <script>
        async function updateUI() {
            try {
                const res = await fetch('data/superliga.json?t=' + Date.now());
                const data = await res.json();
                
                const heroGrid = document.getElementById('hero-grid');
                let heroHtml = "";

                if (data.upcoming && data.upcoming.length > 0) {
                    const m = data.upcoming[0];
                    heroHtml = `
                        <div class="hero-card">
                            <div style="color:#d4af37; font-weight:bold; margin-bottom:15px;">ULTIMUL REZULTAT (ARHIVĂ)</div>
                            <div class="hero-match-row">
                                <div class="team"><img src="${m.logoH}" class="team-logo"><h2>${m.home}</h2></div>
                                <div class="score-box">${m.hScore} - ${m.aScore}</div>
                                <div class="team"><img src="${m.logoA}" class="team-logo"><h2>${m.away}</h2></div>
                            </div>
                        </div>`;
                }
                heroGrid.innerHTML = heroHtml;

                document.getElementById('upcoming-row').innerHTML = data.upcoming.slice(1, 4).map(m => `
                    <div class="u-card">
                        <div style="font-weight:700;">${m.home} ${m.hScore}-${m.aScore} ${m.away}</div>
                    </div>`).join('');

                document.getElementById('standings-list').innerHTML = data.standings.map(s => `
                    <div class="table-row">
                        <span>${s.pos}</span>
                        <div class="team-cell"><img src="${s.logo}"><span>${s.name}</span></div>
                        <span style="text-align:center">${s.pj}</span>
                        <span style="font-weight:bold; color:#d4af37; text-align:right">${s.pts}</span>
                    </div>`).join('');
            } catch (e) { console.error(e); }
        }
        updateUI();
    </script>
</body>
</html>
