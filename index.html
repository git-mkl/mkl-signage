<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>SuperLiga TV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="column col-matches">
            <div class="group-title">Rezultate</div>
            <div id="past-area" class="match-list"></div>
        </div>

        <div class="column col-central">
            <div class="group-title">Meciuri Azi</div>
            <div id="today-area" class="match-list"></div>
            
            <div class="group-title" style="margin-top: 30px;">Program</div>
            <div id="future-area" class="match-list"></div>
        </div>

        <div class="column col-table">
            <div class="league-logo-container">
                <img src="https://images.fotmob.com/image_resources/logo/leaguelogo/dark/189.png" class="league-logo">
            </div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th width="60">#</th>
                            <th align="left">Echipă</th>
                            <th width="80">MJ</th>
                            <th width="80">GD</th>
                            <th width="100">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="std-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            // Added cache busting for TV browsers
            xhr.open('GET', 'data/superliga.json?nocache=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var d = JSON.parse(xhr.responseText);
                    renderMatches('past-area', d.past);
                    renderMatches('today-area', d.today);
                    renderMatches('future-area', d.future);
                    renderStandings(d.standings);
                }
            };
            xhr.send();
        }

        function renderMatches(id, list) {
            var el = document.getElementById(id);
            if (!list || list.length === 0) {
                el.innerHTML = (id === 'today-area') ? '<div style="color:#555;font-size:24px;padding:20px;">Fără meciuri azi</div>' : '';
                return;
            }
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var m = list[i];
                var hLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/' + m.home.id + '.png';
                var aLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/' + m.away.id + '.png';
                var status = (m.status === 'LIVE') ? '<span class="live-dot">● LIVE</span>' : (m.status === 'FT' ? 'FINAL' : m.time);
                
                html += '<div class="match-card">' +
                    '<div class="m-status"><span class="status-left">' + status + '</span><span class="status-right">' + m.date + '</span></div>' +
                    '<div style="clear:both"></div>' +
                    '<div class="team-row"><img src="' + hLogo + '" class="small-logo"><span class="team-name">' + m.home.name + '</span><span class="score">' + m.home.score + '</span></div>' +
                    '<div class="team-row"><img src="' + aLogo + '" class="small-logo"><span class="team-name">' + m.away.name + '</span><span class="score">' + m.away.score + '</span></div>' +
                '</div>';
            }
            el.innerHTML = html;
        }

        function renderStandings(list) {
            var h = '';
            for (var i = 0; i < (list || []).length; i++) {
                var s = list[i];
                var logo = 'https://images.fotmob.com/image_resources/logo/teamlogo/' + s.id + '.png';
                h += '<tr>' +
                    '<td>' + s.rank + '</td>' +
                    '<td class="t-name-cell"><img src="' + logo + '" class="small-logo" style="margin-right:10px">' + s.name + '</td>' +
                    '<td>' + s.pj + '</td>' +
                    '<td>' + (s.gd > 0 ? '+' + s.gd : s.gd) + '</td>' +
                    '<td class="t-pts">' + s.pts + '</td>' +
                '</tr>';
            }
            document.getElementById('std-body').innerHTML = h;
        }

        updateUI();
        setInterval(updateUI, 300000); // 5 minute refresh
    </script>
</body>
</html>
