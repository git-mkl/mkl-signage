<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="column col-matches">
            <div class="group-title">Rezultate Recente</div>
            <div id="past-area"></div>
        </div>

        <div class="column col-central">
            <div id="today-area"></div>
            <div class="group-title">Program Viitor</div>
            <div id="future-area"></div>
        </div>

        <div class="column col-table">
            <div class="group-title">Clasament SuperLiga</div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th><th style="text-align:left">Echipă</th>
                            <th>MJ</th><th>V</th><th>GD</th><th>Pct</th>
                        </tr>
                    </thead>
                    <tbody id="std-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data/superliga.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var d = JSON.parse(xhr.responseText);
                    
                    // Render meciuri folosind concatenare clasica (safe pentru TV)
                    renderGroup('past-area', d.past || d.matches.slice(0,6));
                    renderGroup('today-area', d.today, "AZI / LIVE");
                    renderGroup('future-area', d.future);
                    
                    var h = '';
                    var st = d.standings || [];
                    for (var i = 0; i < Math.min(st.length, 16); i++) {
                        var s = st[i];
                        h += '<tr>' +
                            '<td style="color:#aaa">' + s.rank + '</td>' +
                            '<td class="t-name">' + s.name + '</td>' +
                            '<td>' + s.pj + '</td>' +
                            '<td>' + s.v + '</td>' +
                            '<td>' + s.gd + '</td>' +
                            '<td class="t-pts">' + s.pts + '</td>' +
                        '</tr>';
                    }
                    document.getElementById('std-body').innerHTML = h;
                }
            };
            xhr.send();
        }

        function renderGroup(id, list, specialTitle) {
            var el = document.getElementById(id);
            if (!list || list.length === 0) {
                if(!specialTitle) el.innerHTML = '';
                return;
            }
            var html = specialTitle ? '<div class="group-title" style="background:#d32f2f">' + specialTitle + '</div>' : '';
            for (var i = 0; i < list.length; i++) {
                var m = list[i];
                html += '<div class="match-card">' +
                    '<div class="m-status">' + (m.status === 'FT' ? 'Finalizat' : m.date + ' ' + m.time) + '</div>' +
                    '<div class="team-row"><span class="team-name">' + m.home.name + '</span><span class="score">' + m.home.score + '</span></div>' +
                    '<div class="team-row"><span class="team-name">' + m.away.name + '</span><span class="score">' + m.away.score + '</span></div>' +
                '</div>';
            }
            el.innerHTML = html;
        }

        updateUI();
        setInterval(updateUI, 300000);
    </script>
</body>
</html>
