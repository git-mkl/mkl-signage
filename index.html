<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="column col-matches"><div id="past-area"></div></div>
        <div class="column col-central"><div id="today-area"></div><div id="future-area"></div></div>
        <div class="column col-table">
            <div class="group-title">Clasament SuperLiga</div>
            <div class="table-card">
                <table>
                    <thead><tr><th>#</th><th style="text-align:left">Echipă</th><th>MJ</th><th>V</th><th>GD</th><th>Pts</th></tr></thead>
                    <tbody id="std-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data/superliga.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var d = JSON.parse(xhr.responseText);
                    renderGroup('past-area', 'Rezultate', d.past);
                    renderGroup('today-area', 'Azi / Live', d.today);
                    renderGroup('future-area', 'Program', d.future);
                    var h = '';
                    (d.standings || []).forEach(function(s) {
                        h += '<tr><td>' + s.rank + '</td><td class="t-name">' + s.name + '</td><td>' + s.pj + '</td><td>' + s.v + '</td><td>' + (s.gd > 0 ? '+' + s.gd : s.gd) + '</td><td class="t-pts">' + s.pts + '</td></tr>';
                    });
                    document.getElementById('std-body').innerHTML = h;
                }
            };
            xhr.send();
        }
        function renderGroup(id, title, list) {
            var el = document.getElementById(id);
            if (!list || list.length === 0) { el.innerHTML = ''; return; }
            var html = '<div class="group-title">' + title + '</div>';
            list.forEach(function(m) {
                html += '<div class="match-card"><div class="m-status">' + (m.status === 'FT' ? 'FINALIZAT' : m.time) + '</div>' +
                    '<div class="team-row"><span class="team-name">' + m.home.name + '</span><span class="score">' + m.home.score + '</span></div>' +
                    '<div class="team-row"><span class="team-name">' + m.away.name + '</span><span class="score">' + m.away.score + '</span></div></div>';
            });
            el.innerHTML = html;
        }
        updateUI(); setInterval(updateUI, 300000);
    </script>
</body>
</html>
