<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div id="past-section"></div>
            <div id="today-section"></div>
            <div id="future-section"></div>
        </div>
        <div class="sidebar">
            <div class="group-title">Clasament</div>
            <div class="table-card">
                <table>
                    <tbody id="std-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function renderStandings(standings) {
    var html = '';
    if (standings && standings.length > 0) {
        // Luam doar primele 10-12 echipe ca sa nu iasa din ecran pe inaltime
        var limit = Math.min(standings.length, 12); 
        for (var j = 0; j < limit; j++) {
            var s = standings[j];
            html += '<tr>' +
                '<td style="color:#9aa0a6; width:20px;">' + (s.rank || (j+1)) + '</td>' +
                '<td><strong style="font-size:13px;">' + s.name + '</strong></td>' +
                '<td class="col-num">' + (s.pj || 0) + '</td>' +
                '<td class="col-pct">' + (s.pts || 0) + '</td>' +
            '</tr>';
        }
    }
    document.getElementById('std-body').innerHTML = html;
}

        function renderGroup(containerId, title, matches) {
            if (!matches || matches.length === 0) {
                document.getElementById(containerId).innerHTML = '';
                return;
            }
            var html = '<div class="group-title">' + title + '</div>';
            for (var i = 0; i < matches.length; i++) {
                var m = matches[i];
                html += '<div class="match-card">' +
                    '<div class="m-status">' + (m.status === 'FT' ? 'Finalizat' : m.date + ' ' + m.time) + '</div>' +
                    '<div class="team-row"><span class="team-name">' + m.home.name + '</span><span class="score">' + m.home.score + '</span></div>' +
                    '<div class="team-row"><span class="team-name">' + m.away.name + '</span><span class="score">' + m.away.score + '</span></div>' +
                '</div>';
            }
            document.getElementById(containerId).innerHTML = html;
        }

        updateUI();
        setInterval(updateUI, 300000);
    </script>
</body>
</html>
