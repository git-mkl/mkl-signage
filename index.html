<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <h2 style="font-weight: 400;">Meciuri • SuperLiga</h2>
            <div id="matches-grid" class="matches-grid"></div>
        </main>
        <aside>
            <h2 style="font-weight: 400;">Clasament</h2>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th><th>Club</th><th class="col-num">MJ</th>
                            <th class="col-num">V</th><th class="col-num">GD</th>
                            <th style="text-align:right">Pct</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </aside>
    </div>

    <script>
        async function updateUI() {
            const res = await fetch('data/superliga.json?v=' + Date.now());
            const data = await res.json();

            document.getElementById('matches-grid').innerHTML = data.matches.map(m => `
                <div class="match-card">
                    <div class="m-status">${m.status === 'Programat' ? m.date + ' ' + m.time : m.status}</div>
                    <div class="team-row"><span>${m.home.name}</span><span class="t-score">${m.home.score}</span></div>
                    <div class="team-row"><span>${m.away.name}</span><span class="t-score">${m.away.score}</span></div>
                </div>
            `).join('');

            document.getElementById('standings-body').innerHTML = data.standings.map(s => `
                <tr>
                    <td style="color:var(--muted); width:25px;">${s.rank}</td>
                    <td style="font-weight:500;">${s.name}</td>
                    <td class="col-num">${s.mj}</td>
                    <td class="col-num">${s.v}</td>
                    <td class="col-num">${s.gd}</td>
                    <td class="col-pct">${s.pct}</td>
                </tr>
            `).join('');
        }
        updateUI();
    </script>
</body>
</html>
