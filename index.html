<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperLiga Signage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <div class="top-stats">
                <div class="stat-card">ETAPA TRECUTĂ: GAZDE <br><b>Preluare date...</b></div>
                <div class="stat-card">ETAPA TRECUTĂ: OASPEȚI <br><b>Preluare date...</b></div>
            </div>

            <div id="hero-grid" class="hero-grid"></div>

            <div id="upcoming-row" class="upcoming-row"></div>
        </main>

        <aside class="sidebar">
            <h3 style="margin-top:0">Clasament SuperLiga</h3>
            <div id="standings-list"></div>
        </aside>
    </div>

    <script>
        async function updateUI() {
            try {
                const res = await fetch('data/superliga.json');
                const data = await res.json();

                const heroGrid = document.getElementById('hero-grid');
                let heroHtml = "";

                // Functie helper pentru logouri
                const getLogo = (name) => `https://tse1.mm.bing.net/th?q=${encodeURIComponent(name + " logo football")}&w=100&h=100&c=7`;

                // 1. Randare LIVE sau Programat in HERO
                if (data.liveMatches && data.liveMatches.length > 0) {
                    data.liveMatches.forEach(m => {
                        heroHtml += `
                            <div class="hero-card">
                                <span class="live-badge">LIVE ${m.minute}</span>
                                <div class="hero-match-row">
                                    <div class="team">
                                        <img src="${getLogo(m.home)}" class="team-logo">
                                        <h2>${m.home}</h2>
                                    </div>
                                    <div class="score-box">${m.hScore} - ${m.aScore}</div>
                                    <div class="team">
                                        <img src="${getLogo(m.away)}" class="team-logo">
                                        <h2>${m.away}</h2>
                                    </div>
                                </div>
                            </div>`;
                    });
                } else if (data.upcoming && data.upcoming.length > 0) {
                    const next = data.upcoming[0];
                    const d = new Date(next.time * 1000);
                    const timeStr = d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');

                    heroHtml = `
                        <div class="hero-card">
                            <span class="live-badge" style="background:#30363d">URMĂTORUL MECI</span>
                            <div class="hero-match-row">
                                <div class="team">
                                    <img src="${getLogo(next.home)}" class="team-logo">
                                    <h2>${next.home}</h2>
                                </div>
                                <div class="time-container">
                                    <small>ÎNCEPE LA ORA</small>
                                    <div class="score-box scheduled-box">${timeStr}</div>
                                    <p style="opacity:0.6">${d.toLocaleDateString('ro-RO', {day:'numeric', month:'long'})}</p>
                                </div>
                                <div class="team">
                                    <img src="${getLogo(next.away)}" class="team-logo">
                                    <h2>${next.away}</h2>
                                </div>
                            </div>
                        </div>`;
                }
                heroGrid.innerHTML = heroHtml;

                // 2. Randare Upcoming (celelalte meciuri)
                const upList = data.upcoming.slice(data.liveMatches.length > 0 ? 0 : 1, 4);
                document.getElementById('upcoming-row').innerHTML = upList.map(m => `
                    <div class="u-card">
                        <small style="color:#d4af37">${new Date(m.time * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small><br>
                        <b>${m.home} vs ${m.away}</b>
                    </div>
                `).join('');

                // 3. Randare Clasament
                document.getElementById('standings-list').innerHTML = data.standings.length > 0 ? 
                    data.standings.map(s => `
                        <div class="table-row">
                            <span>${s.pos}</span>
                            <span>${s.name}</span>
                            <b>${s.pts}</b>
                        </div>
                    `).join('') : '<p style="opacity:0.5">Se încarcă clasamentul...</p>';

            } catch (err) { console.error("UI Update Error:", err); }
        }

        updateUI();
        setInterval(updateUI, 60000);
    </script>
</body>
</html>
