<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div id="past-section"></div>
            <div id="today-section"></div>
            <div id="future-section"></div>
        </div>
        <div class="sidebar">
            <div class="group-title">Clasament</div>
            <div class="table-card">
                <table>
                    <tbody id="std-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data/superliga.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    
                    renderGroup('past-section', 'Rezultate recente', data.past);
                    renderGroup('today-section', 'Meciuri Azi', data.today);
                    renderGroup('future-section', 'Program viitor', data.future);
                    
                    var stdHtml = '';
                    for (var i = 0; i < data.standings.length; i++) {
                        var s = data.standings[i];
                        stdHtml += '<tr><td>' + s.rank + '</td><td>' + s.name + '</td><td class="col-pct">' + s.pts + '</td></tr>';
                    }
                    document.getElementById('std-body').innerHTML = stdHtml;
                }
            };
            xhr.send();
        }

        function renderGroup(containerId, title, matches) {
            if (!matches || matches.length === 0) {
                document.getElementById(containerId).innerHTML = '';
                return;
            }
            var html = '<div class="group-title">' + title + '</div>';
            for (var i = 0; i < matches.length; i++) {
                var m = matches[i];
                html += '<div class="match-card">' +
                    '<div class="m-status">' + (m.status === 'FT' ? 'Finalizat' : m.date + ' ' + m.time) + '</div>' +
                    '<div class="team-row"><span class="team-name">' + m.home.name + '</span><span class="score">' + m.home.score + '</span></div>' +
                    '<div class="team-row"><span class="team-name">' + m.away.name + '</span><span class="score">' + m.away.score + '</span></div>' +
                '</div>';
            }
            document.getElementById(containerId).innerHTML = html;
        }

        updateUI();
        setInterval(updateUI, 300000);
    </script>
</body>
</html>
