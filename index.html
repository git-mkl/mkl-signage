<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>SuperLiga TV Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="column col-matches">
            <div class="group-title">Rezultate</div>
            <div id="past-area" class="match-list"></div>
        </div>

        <div class="column col-central">
            <div class="group-title">Meciuri Azi</div>
            <div id="today-area" class="match-list"></div>
            
            <div class="group-title" style="margin-top: 40px;">Program</div>
            <div id="future-area" class="match-list"></div>
        </div>

        <div class="column col-table">
            <div class="group-title">
                <img src="https://images.fotmob.com/image_resources/logo/leaguelogo/dark/189.png" class="league-logo">
                Clasament SuperLiga
            </div>
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">#</th>
                            <th style="text-align:left">Echipă</th>
                            <th style="width: 80px;">MJ</th>
                            <th style="width: 80px;">GD</th>
                            <th style="width: 100px;">Pts</th>
                        </tr>
                    </thead>
                    <tbody id="std-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function updateUI() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'data/superliga.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var d = JSON.parse(xhr.responseText);
                    
                    renderMatches('past-area', d.past);
                    renderMatches('today-area', d.today);
                    renderMatches('future-area', d.future);
                    
                    var h = '';
                    (d.standings || []).forEach(function(s) {
                        var logo = 'https://images.fotmob.com/image_resources/logo/teamlogo/' + s.id + '.png';
                        h += '<tr>' +
                            '<td>' + s.rank + '</td>' +
                            '<td class="t-name"><img src="' + logo + '" class="small-logo"> ' + s.name + '</td>' +
                            '<td>' + s.pj + '</td>' +
                            '<td>' + (s.gd > 0 ? '+' + s.gd : s.gd) + '</td>' +
                            '<td class="t-pts">' + s.pts + '</td>' +
                        '</tr>';
                    });
                    document.getElementById('std-body').innerHTML = h;
                }
            };
            xhr.send();
        }

        function renderMatches(id, list) {
            var el = document.getElementById(id);
            if (!list || list.length === 0) {
                if(id === 'today-area') el.innerHTML = '<div style="color:#555; font-size:24px; padding:20px;">Fără meciuri azi.</div>';
                else el.innerHTML = '';
                return;
            }
            
            var html = '';
            list.forEach(function(m) {
                var hLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/' + m.home.id + '.png';
                var aLogo = 'https://images.fotmob.com/image_resources/logo/teamlogo/' + m.away.id + '.png';
                var statusText = m.status === 'FT' ? 'FINAL' : m.time;
                if (m.status === 'LIVE') statusText = '<span class="live-dot">● LIVE</span>';

                html += '<div class="match-card">' +
                    '<div class="m-status"><span>' + statusText + '</span><span>' + m.date + '</span></div>' +
                    '<div class="team-row"><img src="' + hLogo + '" class="small-logo"><span class="team-name">' + m.home.name + '</span><span class="score">' + m.home.score + '</span></div>' +
                    '<div class="team-row"><img src="' + aLogo + '" class="small-logo"><span class="team-name">' + m.away.name + '</span><span class="score">' + m.away.score + '</span></div>' +
                '</div>';
            });
            el.innerHTML = html;
        }
        updateUI(); setInterval(updateUI, 300000);
    </script>
</body>
</html>
