<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <div class="top-stats">
                <div class="stat-card">ETAPA TRECUTĂ: GAZDE <br><b>Preluare date...</b></div>
                <div class="stat-card">ETAPA TRECUTĂ: OASPEȚI <br><b>Preluare date...</b></div>
            </div>

            <div id="hero-grid" class="hero-grid">
                </div>

            <div id="upcoming-row" class="upcoming-row">
                </div>
        </main>

        <aside class="sidebar">
            <h3>Clasament SuperLiga</h3>
            <div id="standings-list"></div>
        </aside>
    </div>

    <script>
        async function updateUI() {
            const res = await fetch('data/superliga.json');
            const data = await res.json();

            // 1. Render Hero Grid (Live sau Programat)
            const heroGrid = document.getElementById('hero-grid');
            let heroContent = "";

            if (data.liveMatches && data.liveMatches.length > 0) {
                data.liveMatches.forEach(m => {
                    heroContent += `
                        <div class="hero-card">
                            <span class="live-badge">${m.minute}</span>
                            <h2>${m.home}</h2>
                            <div class="score-box">${m.hScore} - ${m.aScore}</div>
                            <h2>${m.away}</h2>
                        </div>`;
                });
            } else if (data.upcoming && data.upcoming.length > 0) {
                const next = data.upcoming[0];
                const d = new Date(next.time * 1000);
                heroContent = `
                    <div class="hero-card">
                        <span class="live-badge" style="background:#30363d">PROGRAMAT</span>
                        <h2>${next.home}</h2>
                        <div class="score-box" style="font-size:1.8rem">${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}</div>
                        <h2>${next.away}</h2>
                        <p>${d.toLocaleDateString('ro-RO', {day:'numeric', month:'long'})}</p>
                    </div>`;
            }
            heroGrid.innerHTML = heroContent;

            // 2. Render Upcoming
            document.getElementById('upcoming-row').innerHTML = data.upcoming.slice(1).map(m => `
                <div class="u-card">
                    <b>${m.home} vs ${m.away}</b><br>
                    <small>${new Date(m.time * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
                </div>
            `).join('');

            // 3. Render Standings
            document.getElementById('standings-list').innerHTML = data.standings.map(s => `
                <div class="table-row">
                    <span>${s.pos}</span>
                    <span>${s.name}</span>
                    <b>${s.pts}</b>
                </div>
            `).join('');
        }

        updateUI();
        setInterval(updateUI, 60000); // Refresh la 1 minut
    </script>
</body>
</html>
