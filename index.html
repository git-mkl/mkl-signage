<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Football Signage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- CORE STABILITY --- */
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 40px 60px;
            background: radial-gradient(circle at 50% 0%, #1c2841 0%, #07090f 100%);
            color: #ffffff;
            /* Using Inter with a robust fallback stack for Tizen */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 40px;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-text {
            font-size: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .brand-text span { 
            color: #ff2a4d; 
            text-shadow: 0 0 15px rgba(255, 42, 77, 0.5);
        }

        .clock-text {
            font-size: 40px;
            font-weight: 400;
            color: #cbd5e1;
            letter-spacing: 1px;
        }

        /* --- FLEX GRID --- */
        #scoreboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-content: flex-start;
        }

        .match-card {
            width: 31%; /* Fits 3 per row on 16:9 */
            height: 380px;
            margin-bottom: 35px;
            background: linear-gradient(145deg, #141c2f 0%, #0d1323 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 6px solid #3b82f6; 
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-badge {
            background: rgba(255, 42, 77, 0.15);
            border: 1px solid rgba(255, 42, 77, 0.4);
            color: #ff2a4d;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 900;
        }

        /* --- CONTENT --- */
        .match-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }

        .team-box {
            width: 35%;
            text-align: center;
        }

        .team-box img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
        }

        .team-name {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            display: block;
            line-height: 1.2;
        }

        /* --- SCORE PILL --- */
        .score-pill {
            width: 170px;
            height: 90px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .score-digit {
            flex: 1;
            text-align: center;
            font-size: 60px;
            font-weight: 900;
            color: #ffffff;
        }

        .score-dash {
            font-size: 30px;
            font-weight: 300;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-text">LIVE<span>SCORES</span></div>
        <div class="clock-text" id="clock">00:00:00</div>
    </header>

    <div id="scoreboard"></div>

    <script>
        var API_TOKEN = '08E5icuXgWTVJernUT1hzH0ML9sMxcS2XmBiXUWn1pqDqtVCcRCDPjxqEF1c'; 
        var USE_MOCK_DATA = true; // Still using Mock Data for layout testing

        function updateClock() {
            var now = new Date();
            var h = ("0" + now.getHours()).slice(-2);
            var m = ("0" + now.getMinutes()).slice(-2);
            var s = ("0" + now.getSeconds()).slice(-2);
            document.getElementById('clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderMatches(matches) {
            var board = document.getElementById('scoreboard');
            var html = "";
            var placeholder = "https://cdn.sportmonks.com/images/soccer/placeholder.png";

            for (var i = 0; i < matches.length; i++) {
                var m = matches[i];
                var scoreParts = m.score.split(' - ');
                var hS = scoreParts[0] || "0";
                var aS = scoreParts[1] || "0";

                html += '<div class="match-card">';
                html += '  <div class="match-header">';
                html += '    <div>' + m.league + '</div>';
                html += '    <div class="live-badge">' + m.minute + '\'</div>';
                html += '  </div>';
                html += '  <div class="match-content">';
                
                // HOME
                html += '    <div class="team-box">';
                html += '      <img src="' + m.home.logo + '" onerror="this.src=\''+placeholder+'\'">';
                html += '      <span class="team-name">' + m.home.name + '</span>';
                html += '    </div>';
                
                // SCORE
                html += '    <div class="score-pill">';
                html += '      <div class="score-digit">' + hS + '</div>';
                html += '      <div class="score-dash">-</div>';
                html += '      <div class="score-digit">' + aS + '</div>';
                html += '    </div>';
                
                // AWAY
                html += '    <div class="team-box">';
                html += '      <img src="' + m.away.logo + '" onerror="this.src=\''+placeholder+'\'">';
                html += '      <span class="team-name">' + m.away.name + '</span>';
                html += '    </div>';
                
                html += '  </div>';
                html += '</div>';
            }
            board.innerHTML = html;
        }

        function getMockData() {
            return [
                { league: 'Scottish Premiership', minute: '68', score: '1 - 1', home: { name: 'Celtic', logo: 'https://cdn.sportmonks.com/images/soccer/teams/21/53.png' }, away: { name: 'Rangers', logo: 'https://cdn.sportmonks.com/images/soccer/teams/31/63.png' } },
                { league: 'Danish Superliga', minute: '45', score: '2 - 0', home: { name: 'FC Copenhagen', logo: 'https://cdn.sportmonks.com/images/soccer/teams/6/86.png' }, away: { name: 'FC Midtjylland', logo: 'https://cdn.sportmonks.com/images/soccer/teams/29/93.png' } },
                { league: 'Scottish Premiership', minute: 'HT', score: '0 - 0', home: { name: 'Aberdeen', logo: 'https://cdn.sportmonks.com/images/soccer/teams/19/275.png' }, away: { name: 'Hibernian', logo: 'https://cdn.sportmonks.com/images/soccer/teams/20/308.png' } },
                { league: 'Danish Superliga', minute: '82', score: '3 - 1', home: { name: 'Brøndby IF', logo: 'https://cdn.sportmonks.com/images/soccer/teams/13/85.png' }, away: { name: 'FC Nordsjælland', logo: 'https://cdn.sportmonks.com/images/soccer/teams/28/316.png' } },
                { league: 'Scottish Premiership', minute: '12', score: '0 - 1', home: { name: 'Hearts', logo: 'https://cdn.sportmonks.com/images/soccer/teams/12/412.png' }, away: { name: 'Motherwell', logo: 'https://cdn.sportmonks.com/images/soccer/teams/22/310.png' } },
                { league: 'Danish Superliga', minute: '55', score: '0 - 0', home: { name: 'AGF', logo: 'https://cdn.sportmonks.com/images/soccer/teams/15/239.png' }, away: { name: 'Silkeborg', logo: 'https://cdn.sportmonks.com/images/soccer/teams/20/244.png' } }
            ];
        }

        renderMatches(getMockData());
    </script>
</body>
</html>
