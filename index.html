<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main>
            <div id="live-container"></div>
            <h2>Meciuri • SuperLiga</h2>
            <div id="matches-grid" class="match-grid"></div>
        </main>
        <aside>
            <h2>Clasament</h2>
            <div class="sidebar-card">
                <table>
                    <thead>
                        <tr><th>#</th><th>Echipă</th><th>MJ</th><th style="text-align:right">Pct</th></tr>
                    </thead>
                    <tbody id="standings-list"></tbody>
                </table>
            </div>
        </aside>
    </div>

    <script>
        async function updateUI() {
            try {
                const res = await fetch('data/superliga.json?t=' + Date.now());
                const data = await res.json();

                // 1. LIVE
                if (data.live && data.live.length > 0) {
                    document.getElementById('live-container').innerHTML = `
                        <h2 class="live-txt">● LIVE ACUM</h2>
                        <div class="match-grid" style="margin-bottom:25px">${data.live.map(m => renderCard(m)).join('')}</div>`;
                }

                // 2. Recente + Viitoare
                const all = [...data.recent, ...data.upcoming];
                if (all.length > 0) {
                    document.getElementById('matches-grid').innerHTML = all.map(m => renderCard(m)).join('');
                } else {
                    document.getElementById('matches-grid').innerHTML = "<p>Nu s-au gasit meciuri programate.</p>";
                }

                // 3. Clasament
                if (data.standings && data.standings.length > 0) {
                    document.getElementById('standings-list').innerHTML = data.standings.map(s => `
                        <tr>
                            <td style="color:#9aa0a6">${s.pos}</td>
                            <td style="font-weight:500">${s.name}</td>
                            <td style="color:#9aa0a6">${s.pj}</td>
                            <td class="pts-col">${s.pts}</td>
                        </tr>`).join('');
                }
            } catch (e) { console.error("Eroare UI:", e); }
        }

        function renderCard(m) {
            const isLive = m.status === 'LIVE';
            return `
                <div class="card">
                    <div class="status ${isLive ? 'live-txt' : ''}">${isLive ? '● LIVE' : m.date + ' ' + m.time}</div>
                    <div class="team-row"><span>${m.home.name}</span><span class="score">${m.home.score}</span></div>
                    <div class="team-row"><span>${m.away.name}</span><span class="score">${m.away.score}</span></div>
                </div>`;
        }

        updateUI();
    </script>
</body>
</html>
