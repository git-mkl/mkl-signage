<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SuperLiga Signage - Official Data</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <main>
            <div id="hero-grid" class="hero-grid"></div>
            <div id="upcoming-row" class="upcoming-row"></div>
        </main>

        <aside class="sidebar">
            <h2 style="margin:0 0 20px 0; font-size:1.2rem;">CLASAMENT SUPERLIGA</h2>
            <div class="table-header">
                <span>#</span>
                <span>ECHIPĂ</span>
                <span style="text-align:center">PJ</span>
                <span style="text-align:right">PCT</span>
            </div>
            <div id="standings-list"></div>
            <p id="update-time" style="font-size:0.7rem; color:#444; margin-top:20px;"></p>
        </aside>
    </div>

    <script>
        async function updateUI() {
            try {
                const res = await fetch('data/superliga.json?v=' + Date.now());
                const data = await res.json();

                const heroGrid = document.getElementById('hero-grid');
                const getLogo = (n) => `https://tse1.mm.bing.net/th?q=${encodeURIComponent(n + " logo fotbal png")}&w=150&h=150&c=7`;

                let heroHtml = "";
                if (data.liveMatches.length > 0) {
                    data.liveMatches.forEach(m => {
                        heroHtml += `
                            <div class="hero-card">
                                <div style="background:#da3633; color:white; padding:5px 15px; border-radius:30px; display:inline-block; font-size:0.8rem; font-weight:900; margin-bottom:20px;">LIVE ${m.minute}</div>
                                <div class="hero-match-row">
                                    <div class="team"><img src="${getLogo(m.home)}" class="team-logo"><h2>${m.home}</h2></div>
                                    <div class="score-box">${m.hScore} - ${m.aScore}</div>
                                    <div class="team"><img src="${getLogo(m.away)}" class="team-logo"><h2>${m.away}</h2></div>
                                </div>
                            </div>`;
                    });
                } else if (data.upcoming.length > 0) {
                    const next = data.upcoming[0];
                    const d = new Date(next.time * 1000);
                    heroHtml = `
                        <div class="hero-card">
                            <div style="background:#30363d; color:#8b949e; padding:5px 15px; border-radius:30px; display:inline-block; font-size:0.8rem; font-weight:900; margin-bottom:20px;">URMĂTORUL MECI</div>
                            <div class="hero-match-row">
                                <div class="team"><img src="${getLogo(next.home)}" class="team-logo"><h2>${next.home}</h2></div>
                                <div class="time-container">
                                    <div class="time-label">ÎNCEPE LA ORA</div>
                                    <div class="score-box" style="border-color:#30363d; background:#161b22">${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}</div>
                                    <div style="margin-top:10px; font-weight:bold; opacity:0.5">${d.toLocaleDateString('ro-RO', {day:'numeric', month:'long'})}</div>
                                </div>
                                <div class="team"><img src="${getLogo(next.away)}" class="team-logo"><h2>${next.away}</h2></div>
                            </div>
                        </div>`;
                }
                heroGrid.innerHTML = heroHtml;

                // Upcoming
                const upMatches = data.upcoming.slice(data.liveMatches.length > 0 ? 0 : 1, 4);
                document.getElementById('upcoming-row').innerHTML = upMatches.map(m => `
                    <div class="u-card">
                        <div style="color:#d4af37; font-weight:900; font-size:0.8rem; margin-bottom:5px;">${new Date(m.time * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        <div style="font-weight:700; font-size:0.9rem;">${m.home} - ${m.away}</div>
                    </div>
                `).join('');

                // Standings
                document.getElementById('standings-list').innerHTML = data.standings.map(s => `
                    <div class="table-row">
                        <span class="pos">${s.pos}</span>
                        <span style="font-weight:700">${s.name}</span>
                        <span class="pj">${s.pj}</span>
                        <span class="pts">${s.pts}</span>
                    </div>
                `).join('');

                document.getElementById('update-time').innerText = "Sursă: " + data.source + " | Actualizat: " + new Date(data.updatedAt).toLocaleTimeString();

            } catch (e) { console.error(e); }
        }

        updateUI();
        setInterval(updateUI, 60000);
    </script>
</body>
</html>
